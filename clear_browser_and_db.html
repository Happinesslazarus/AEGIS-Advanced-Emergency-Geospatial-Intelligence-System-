<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS - Clear All Data</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .danger {
            background: #e74c3c;
            color: white;
        }
        .danger:hover {
            background: #c0392b;
            transform: scale(1.02);
        }
        .success {
            background: #27ae60;
            color: white;
        }
        .success:hover {
            background: #229954;
            transform: scale(1.02);
        }
        .info {
            background: #3498db;
            color: white;
        }
        .info:hover {
            background: #2980b9;
            transform: scale(1.02);
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            font-size: 14px;
        }
        .status.empty {
            background: rgba(39, 174, 96, 0.3);
            border: 2px solid #27ae60;
        }
        .status.has-data {
            background: rgba(231, 76, 60, 0.3);
            border: 2px solid #e74c3c;
        }
        ul {
            margin: 10px 0;
            padding-left: 20px;
        }
        li {
            margin: 5px 0;
        }
        .warning {
            background: rgba(255, 193, 7, 0.3);
            border: 2px solid #ffc107;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 AEGIS System Reset</h1>
        
        <div class="warning">
            ⚠️ <strong>This will completely clear all stored data</strong>
        </div>

        <div id="status" class="status">
            Checking browser storage...
        </div>

        <button class="danger" onclick="clearAllBrowserData()">
            🔥 Clear ALL Browser Data (Tokens, Cache, etc.)
        </button>

        <button class="success" onclick="checkStorage()">
            🔍 Check What's Stored in Browser
        </button>

        <button class="info" onclick="window.location.href='http://localhost:5173'">
            🏠 Go to Homepage
        </button>

        <div id="details" style="margin-top: 20px;"></div>
    </div>

    <script>
        function checkStorage() {
            const tokens = [];
            const keys = Object.keys(localStorage);
            
            keys.forEach(key => {
                if (key.includes('aegis') || key.includes('token') || key.includes('auth')) {
                    tokens.push(`${key}: ${localStorage.getItem(key).substring(0, 50)}...`);
                }
            });

            const status = document.getElementById('status');
            const details = document.getElementById('details');
            
            if (tokens.length === 0) {
                status.className = 'status empty';
                status.innerHTML = '✅ <strong>Browser storage is CLEAN</strong><br>No authentication tokens found';
                details.innerHTML = '';
            } else {
                status.className = 'status has-data';
                status.innerHTML = `❌ <strong>Found ${tokens.length} stored item(s):</strong>`;
                details.innerHTML = '<ul>' + tokens.map(t => `<li style="font-size:12px; word-break:break-all;">${t}</li>`).join('') + '</ul>';
            }
        }

        function clearAllBrowserData() {
            const confirmed = confirm(
                '⚠️ This will:\n\n' +
                '• Clear all localStorage (tokens, settings)\n' +
                '• Clear all sessionStorage\n' +
                '• Clear all cookies\n' +
                '• Log you out completely\n\n' +
                'Are you sure?'
            );

            if (!confirmed) return;

            // Clear localStorage
            localStorage.clear();

            // Clear sessionStorage
            sessionStorage.clear();

            // Clear cookies
            document.cookie.split(";").forEach(function(c) { 
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/"); 
            });

            // Clear IndexedDB
            if (window.indexedDB) {
                indexedDB.databases().then(databases => {
                    databases.forEach(db => {
                        indexedDB.deleteDatabase(db.name);
                    });
                });
            }

            const status = document.getElementById('status');
            status.className = 'status empty';
            status.innerHTML = '✅ <strong>SUCCESS!</strong><br>All browser data cleared.<br><br>Refreshing page in 2 seconds...';
            
            setTimeout(() => {
                window.location.reload();
            }, 2000);
        }

        // Auto-check on load
        window.onload = checkStorage;
    </script>
</body>
</html>
